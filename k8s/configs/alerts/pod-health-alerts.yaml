apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: pod-health-alerts
  namespace: monitoring # ← THIS was your entire problem
  labels:
    release: kube-prometheus-stack # ← required for kube-prometheus-stack
spec:
  groups:
    - name: pod-health.rules
      rules:
        - alert: HighPodMemoryUsage
          expr: |
            (
              sum by (pod, namespace)(
                container_memory_working_set_bytes{container!="POD",container!=""}
              )
              /
              sum by (pod, namespace)(
                kube_pod_container_resource_limits_memory_bytes
              )
            ) > 0.8
          for: 5m # ← you used 1m before, but your report says 5m
          labels:
            severity: warning
            component: pod
          annotations:
            summary: High memory usage on pod
            description: Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} is using more than 80% of its memory limit.

        - alert: HighPodCPUUsage
          expr: |
            (
              sum by (pod, namespace)(
                rate(container_cpu_usage_seconds_total{container!="POD",container!=""}[2m])
              )
              /
              sum by (pod, namespace)(
                kube_pod_container_resource_limits{resource="cpu"}
              )
            ) > 0.8
          for: 5m
          labels:
            severity: warning
            component: pod
          annotations:
            summary: High CPU usage on pod
            description: Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} is using more than 80% of its CPU limit.

        - alert: PodRestartingFrequently
          expr: |
            sum by (pod, namespace)(
              increase(kube_pod_container_status_restarts_total[5m])
            ) > 3
          for: 2m
          labels:
            severity: critical
            component: pod
          annotations:
            summary: Pod restarting frequently
            description: Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} restarted more than 3 times in 5 minutes.
