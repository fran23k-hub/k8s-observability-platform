<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Francis Kelly{% endblock %}</title>

  <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='favicon.ico') }}">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <!-- Main Site CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">

  {% block head %}{% endblock %}
</head>

<body>

<!-- ── NAVBAR ── -->
<nav class="navbar navbar-expand-xl navbar-custom fixed-top container-fluid">
  <div class="container d-flex align-items-center justify-content-between">

    <div class="brand-group d-flex align-items-center">
      <a class="navbar-brand d-flex align-items-center" href="https://franciskelly.ie" aria-label="Go to portfolio">
        <img src="{{ url_for('static', filename='images/logo.svg') }}"
             class="navbar-logo" alt="FK Logo" width="28" height="28">
      </a>
    </div>

    <div class="d-flex align-items-center gap-2">
      <button id="backToTop" class="nav-circle-btn" aria-label="Back to top">
        <i class="fa-solid fa-arrow-up"></i>
      </button>
      <a href="https://franciskelly.ie"
         id="backToHome"
         class="nav-circle-btn show"
         aria-label="Back to portfolio">
        <i class="fa-solid fa-arrow-left"></i>
      </a>
    </div>

  </div>
</nav>

<!-- ── MAIN ── -->
<main style="padding-top: calc(var(--nav-height) + 40px); padding-bottom: 60px;">
  {% block content %}{% endblock %}
</main>

<!-- ── FOOTER ── -->
<footer>
  <div class="container">
    <div class="footer-bottom">
      <div class="footer-social">
        <a href="https://www.linkedin.com/in/francis-kelly-dublin/"
           target="_blank" rel="noopener noreferrer"
           aria-label="LinkedIn" class="footer-social-link">
          <i class="fa-brands fa-linkedin"></i>
        </a>
        <a href="https://github.com/fran23k-hub"
           target="_blank" rel="noopener noreferrer"
           aria-label="GitHub" class="footer-social-link">
          <i class="fa-brands fa-github"></i>
        </a>
        <a href="https://x.com/FrancisKellyX"
           target="_blank" rel="noopener noreferrer"
           aria-label="X (Twitter)" class="footer-social-link">
          <i class="fa-brands fa-x-twitter"></i>
        </a>
        <a href="https://www.youtube.com/@FrancisKellyYT"
           target="_blank" rel="noopener noreferrer"
           aria-label="YouTube" class="footer-social-link">
          <i class="fa-brands fa-youtube"></i>
        </a>
      </div>
      <p class="footer-copy">
        &copy; 2026 Francis Kelly. All rights reserved. &nbsp;&middot;&nbsp;
        <a href="https://franciskelly.ie/privacy.html">Privacy Policy</a>
      </p>
    </div>
  </div>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
  const backTopBtn = document.getElementById("backToTop");
  const backHomeBtn = document.getElementById("backToHome");

  window.addEventListener("scroll", () => {
    backTopBtn.classList.toggle("show", window.scrollY > 200);
    backHomeBtn.classList.toggle("show", window.scrollY > 200);
  }, { passive: true });

  backTopBtn.addEventListener("click", () => window.scrollTo({ top: 0, behavior: "smooth" }));

  const navbar = document.querySelector(".navbar-custom");
  window.addEventListener("scroll", () => {
    navbar.classList.toggle("navbar-scrolled", window.scrollY > 60);
  }, { passive: true });
</script>

{% block scripts %}{% endblock %}
</body>
</html>
