apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.name }}
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "order-api"
        vault.hashicorp.com/agent-pre-populate-only: "false"
        vault.hashicorp.com/agent-inject-containers: "order-api"
        vault.hashicorp.com/agent-inject-secret-db-creds: "database/creds/order-api-role"
        vault.hashicorp.com/agent-inject-template-db-creds: |
          {{`{{- with secret "database/creds/order-api-role" -}}`}}
          DB_USER={{`{{ .Data.username }}`}}
          DB_PASSWORD={{`{{ .Data.password }}`}}
          {{`{{- end }}`}}

        # 🔥 FIX: reduce Vault sidecar resource usage
        vault.hashicorp.com/agent-requests-cpu: "50m"
        vault.hashicorp.com/agent-limits-cpu: "100m"
        vault.hashicorp.com/agent-requests-memory: "32Mi"
        vault.hashicorp.com/agent-limits-memory: "64Mi"

        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
        prometheus.io/path: "/metrics"

    spec:
      serviceAccountName: order-api

      containers:
        - name: {{ .Values.name }}
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          ports:
            - containerPort: {{ .Values.service.targetPort }}

          env:
            - name: DB_HOST
              value: {{ .Values.env.DB_HOST | quote }}
            - name: DB_NAME
              value: {{ .Values.env.DB_NAME | quote }}
            - name: USE_CACHE
              value: {{ .Values.env.USE_CACHE | quote }}
            - name: SIMULATE_BOTTLENECK
              value: {{ .Values.env.SIMULATE_BOTTLENECK | quote }}

          # 🔥 FIX: now controlled by values.yaml
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu | quote }}
              memory: {{ .Values.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.resources.limits.cpu | quote }}
              memory: {{ .Values.resources.limits.memory | quote }}

          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            seccompProfile:
              type: RuntimeDefault

          volumeMounts:
            - mountPath: /tmp
              name: tmp

      volumes:
        - name: tmp
          emptyDir: {}
