apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: order-api-ingress
  annotations:
    {{- if .Values.ingress.rateLimit.enabled }}
    nginx.ingress.kubernetes.io/limit-rps: "{{ .Values.ingress.rateLimit.rps }}"
    nginx.ingress.kubernetes.io/limit-burst: "{{ .Values.ingress.rateLimit.burst }}"
    nginx.ingress.kubernetes.io/limit-req-status-code: "429"
    nginx.ingress.kubernetes.io/use-forwarded-headers: {{ .Values.ingress.rateLimit.useForwardedHeaders | quote }}
    nginx.ingress.kubernetes.io/limit-whitelist: "127.0.0.1"
    {{- end }}
spec:
  ingressClassName: nginx
  rules:
    - host: orders.franciskelly.ie
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: order-api
                port:
                  number: 80
